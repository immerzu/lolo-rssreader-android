Summary: Compact RSS reader with OPML, favorites, offline reading and dark mode
Description: |-
  RSS Reader is a compact, classic feed reader for RSS and Atom feeds.

  New articles are stored locally and can be read in the built-in reader view or opened in the browser.

  Features:

  * Subscribe to RSS and Atom feeds
  * Import and export OPML
  * Mark articles as read or unread
  * Protect favorites from deletion
  * Light and dark theme
  * Background refresh with notifications
  * Compact reader view with images and swipe navigation
